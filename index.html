<!DOCTYPE html><html lang="en"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>A&P Flashcards</title><style>:root{--bg:#0b1220;--fg:#f8fafc;--muted:#94a3b8;--accent:#0ea5e9;--good:#16a34a;--bad:#dc2626}*{box-sizing:border-box}body.app{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";min-height:100vh;display:flex;flex-direction:column}.header{display:flex;gap:1rem;align-items:center;justify-content:space-between;padding:1rem;border-bottom:1px solid #1f2937}.header h1{font-size:1.2rem;margin:0}.header select{background:#111827;color:var(--fg);border:1px solid #374151;padding:.5rem;border-radius:.5rem}.main{display:grid;place-items:center;padding:1rem;gap:1rem;flex:1}.card{width:min(640px,95vw);background:#0f172a;border:1px solid #1f2937;border-radius:1rem;padding:1rem;display:flex;flex-direction:column;align-items:center;gap:1rem;cursor:pointer;outline:none}.card img{width:100%;height:auto;border-radius:.5rem;background:#0b1220}.back{font-size:1.25rem;color:var(--accent);font-weight:600}.controls{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center}.btn{background:#111827;color:var(--fg);border:1px solid #374151;padding:.6rem 1rem;border-radius:.75rem;cursor:pointer}.btn:hover{border-color:#64748b}.btn.good{border-color:#14532d;color:#bbf7d0}.btn.bad{border-color:#7f1d1d;color:#fecaca}.stats{display:flex;gap:1rem;color:var(--muted)}.footer{padding:1rem;color:var(--muted);text-align:center;border-top:1px solid #1f2937}@media (min-width:768px){.header h1{font-size:1.5rem}}
</style></head> <body class="app"> <header class="header"> <h1>A&P Flashcards</h1> <select id="deckSelect" aria-label="Select deck"></select> </header> <main class="main"> <div id="card" class="card" tabindex="0" aria-live="polite"> <img id="front" alt=""> <div id="back" class="back" hidden></div> </div> <div class="controls"> <button id="flip" class="btn">Flip</button> <button id="knew" class="btn good">I knew it</button> <button id="missed" class="btn bad">I missed it</button> <button id="next" class="btn">Next ➜</button> </div> <section class="stats"> <div>Box 1: <span id="b1">0</span></div> <div>Box 2: <span id="b2">0</span></div> <div>Box 3: <span id="b3">0</span></div> <div>Total: <span id="total">0</span></div> </section> </main> <footer class="footer"> <a href="/flashcards-astro-starter/decks/anatomy-bones.json" target="_blank" rel="noopener">View deck JSON</a> <span>· Offline-ready PWA</span> </footer>   <script type="module">
      // ES6 FlashcardApp Class
      class FlashcardApp {
        constructor(config = {}) {
          // Instance properties (formerly global variables)
          this.seenKeyPrefix = 'deck-progress-v1:';
          this.cards = [];
          this.currentIndex = 0;
          this.showingFront = true;
          this.progress = {};
          this.BASE = '/flashcards-astro-starter/';
          
          // Available decks
          this.decks = config.decks || [
            { name: 'Anatomy: Bones', file: 'anatomy-bones.json' }
          ];
          
          // Initialize the app
          this.init();
        }

        // Utility method for DOM selection
        $(id) {
          return document.getElementById(id);
        }

        // localStorage utilities
        loadProgress(key) {
          try {
            return JSON.parse(localStorage.getItem(key) || '{}');
          } catch {
            return {};
          }
        }

        saveProgress(key, value) {
          localStorage.setItem(key, JSON.stringify(value));
        }

        // Update statistics display
        updateStats() {
          let b1 = 0, b2 = 0, b3 = 0;
          for (const k in this.progress) {
            const v = this.progress[k];
            if (v === 1) b1++;
            else if (v === 2) b2++;
            else if (v === 3) b3++;
          }
          this.$('b1').textContent = b1;
          this.$('b2').textContent = b2;
          this.$('b3').textContent = b3;
          this.$('total').textContent = this.cards.length;
        }

        // Path resolution utility
        resolvePath(p) {
          if (!p) return p;
          // If already includes the base, return as-is
          if (p.startsWith(this.BASE)) return p;
          // Absolute paths like '/images/..' should be prefixed with BASE
          if (p.startsWith('/')) return this.BASE.replace(/\/$/, '') + p;
          // Relative paths are returned unchanged
          return p;
        }

        // Load a deck of flashcards
        async loadDeck(deckFile) {
          // For this demo, use hardcoded data instead of fetch
          this.cards = [
            {
              image: "src/assets/images/Biceps_Brachii.png",
              answer: "Biceps Brachii",
              alt: "Biceps brachii muscle",
              deck: "Muscles"
            },
            {
              image: "src/assets/images/Brachialis.png", 
              answer: "Brachialis",
              alt: "Brachialis muscle",
              deck: "Muscles"
            },
            {
              image: "src/assets/images/ECRB.png",
              answer: "Extensor Carpi Radialis Brevis",
              alt: "ECRB muscle",
              deck: "Muscles"
            },
            {
              image: "src/assets/images/Flexor-Carpi-Radialis.png",
              answer: "Flexor Carpi Radialis", 
              alt: "Flexor carpi radialis muscle",
              deck: "Muscles"
            },
            {
              image: "src/assets/images/Pronator-Quad-Sobotto.png",
              answer: "Pronator Quadratus",
              alt: "Pronator quadratus muscle", 
              deck: "Muscles"
            },
            {
              image: "src/assets/images/subscapularis.png",
              answer: "Subscapularis",
              alt: "Subscapularis muscle",
              deck: "Muscles"
            },
            {
              image: "src/assets/images/Teres Major.png",
              answer: "Teres Major", 
              alt: "Teres major muscle",
              deck: "Muscles"
            }
          ];
          
          this.currentIndex = 0;
          this.showingFront = true;
          this.progress = this.loadProgress(this.seenKeyPrefix + deckFile);
          this.render();
          this.fillDeckSelect(deckFile);
          this.updateStats();
        }

        // Populate deck selection dropdown
        fillDeckSelect(current) {
          const sel = this.$('deckSelect');
          sel.innerHTML = '';
          for (const d of this.decks) {
            const opt = document.createElement('option');
            opt.value = d.file;
            opt.textContent = d.name;
            if (d.file === current) opt.selected = true;
            sel.appendChild(opt);
          }
          sel.onchange = () => this.loadDeck(sel.value);
        }

        // Render current flashcard
        render() {
          const c = this.cards[this.currentIndex];
          if (!c) return;
          
          const front = this.$('front');
          const back = this.$('back');
          
          front.src = this.resolvePath(c.image);
          front.alt = c.alt || c.answer || 'Flashcard image';
          back.textContent = c.answer;
          back.hidden = this.showingFront;
        }

        // Set spaced repetition box for current card
        setBox(delta) {
          const val = Math.max(1, Math.min(3, (this.progress[this.currentIndex] || 1) + delta));
          this.progress[this.currentIndex] = val;
          this.updateStats();
          this.saveProgress(this.seenKeyPrefix + this.$('deckSelect').value, this.progress);
        }

        // Flip the current card
        flip() {
          this.showingFront = !this.showingFront;
          this.render();
        }

        // Move to next card
        next() {
          this.currentIndex = (this.currentIndex + 1) % this.cards.length;
          this.showingFront = true;
          this.render();
        }

        // Mark card as known and move to next
        markKnown() {
          this.setBox(+1);
          this.next();
        }

        // Mark card as missed and move to next
        markMissed() {
          this.setBox(-2);
          this.next();
        }

        // Setup event listeners
        setupEventListeners() {
          // Button event listeners
          this.$('flip').onclick = () => this.flip();
          this.$('knew').onclick = () => this.markKnown();
          this.$('missed').onclick = () => this.markMissed();
          this.$('next').onclick = () => this.next();
          
          // Card click to flip
          this.$('card').onclick = () => this.flip();
          
          // Keyboard shortcuts
          this.$('card').onkeydown = (e) => {
            if (['Enter', ' '].includes(e.key)) {
              e.preventDefault();
              this.flip();
            }
            if (e.key === 'ArrowRight') this.next();
            if (e.key === 'ArrowUp') this.markKnown();
            if (e.key === 'ArrowDown') this.markMissed();
          };
        }

        // Initialize the application
        async init() {
          this.setupEventListeners();
          await this.loadDeck('anatomy-bones.json');
        }
      }

      // Create and start the application
      const flashcardApp = new FlashcardApp();
    </script> </body> </html>
